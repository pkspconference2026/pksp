<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ================= CONFIG FIREBASE ANDA (sama macam index.html) =================
    const firebaseConfig = {
        apiKey: "AIzaSyBRKVRVCNW5fQxKcGHGH_lQdrpfBpmGmUU",
        authDomain: "pkspconference.firebaseapp.com",
        projectId: "pkspconference",
        storageBucket: "pkspconference.firebasestorage.app",
        messagingSenderId: "643373687923",
        appId: "1:643373687923:web:0aa25f76f9080e3d1df606"
    };

    // ================= PASSWORD ADMIN (tukar kalau nak) =================
    const ADMIN_PASSWORD = "hafiz2026admin";

    // ================= MULAI =================
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Simple password protection (tak perlu auth Firebase untuk admin simple ni)
    const password = prompt("Masukkan kata laluan admin:");
    if (password !== ADMIN_PASSWORD) {
        alert("Kata laluan salah! Akses ditolak.");
        window.location.href = "index.html";
        throw new Error("Access denied");
    }

    // Load data - path EXACT dari Firebase anda
    const q = query(
        collection(db, 'artifacts', 'msw-kuantan-2026', 'public', 'data', 'pendaftaran'),
        orderBy('timestamp', 'desc')
    );

    onSnapshot(q, (snapshot) => {
        const tableBody = document.getElementById('tableBody');
        const countEl = document.getElementById('count');
        const loading = document.getElementById('loading');
        const table = document.getElementById('pesertaTable');

        tableBody.innerHTML = '';
        let bil = 1;

        snapshot.forEach((doc) => {
            const data = doc.data();
            const ts = data.timestamp ? data.timestamp.seconds * 1000 : null;
            const tarikh = ts 
                ? new Date(ts).toLocaleString('ms-MY', {
                    day: '2-digit', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                  }) 
                : '—';

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${bil++}</td>
                <td>${data.nama || '—'}</td>
                <td>${data.ic || '—'}</td>
                <td>${data.negeri || '—'}</td>
                <td>${data.tempat_bertugas || '—'}</td>
                <td>${data.tel || '—'}</td>
                <td class="timestamp">${tarikh}</td>
            `;
            tableBody.appendChild(row);
        });

        countEl.textContent = snapshot.size;
        loading.style.display = 'none';
        table.style.display = 'table';

        // Debug log (boleh padam lepas test)
        console.log("Jumlah peserta:", snapshot.size);
        console.log("Document IDs:", snapshot.docs.map(d => d.id));
    }, (error) => {
        console.error("Firestore Error:", error.code, error.message);
        document.getElementById('loading').innerHTML = 
            '<span style="color:red; font-weight:bold;">Ralat: ' + error.message + '</span><br>Sila semak console (F12)';
    });
</script>
