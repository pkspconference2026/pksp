<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Senarai Peserta Persidangan 2026</title>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #1e3a8a; text-align: center; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #1e3a8a; color: white; font-weight: bold; }
        tr:nth-child(even) { background: #f8f9fa; }
        tr:hover { background: #e9ecef; }
        .timestamp { font-size: 0.9em; color: #555; }
        #loading { text-align: center; font-size: 1.1em; color: #666; margin: 40px 0; }
        #count { font-weight: bold; color: #c5a059; }
        #error-message { color: red; font-weight: bold; text-align: center; margin: 20px 0; }
        #password-container { text-align: center; padding: 100px 20px; max-width: 500px; margin: 0 auto; }
        #password-container input { padding: 12px; width: 80%; font-size: 1.2em; margin-bottom: 15px; box-sizing: border-box; }
        #password-container button { padding: 12px 40px; background: #1e3a8a; color: white; border: none; cursor: pointer; font-size: 1.1em; }
        #password-container button:hover { background: #0f172a; }
        .download-btn { padding: 10px 20px; margin: 10px; background: #c5a059; color: white; border: none; cursor: pointer; font-size: 1em; }
        .download-btn.pdf { background: #1e3a8a; }
        .back-btn { margin-top: 30px; padding: 10px 20px; background: #6b7280; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="password-container">
    <h2>Masuk Kata Laluan Admin</h2>
    <input type="password" id="adminPass" placeholder="Kata laluan" autocomplete="off">
    <br><br>
    <button id="loginBtn">Masuk</button>
</div>

<div id="main-content" style="display:none;">
    <div class="container">
        <h1>Senarai Peserta Pendaftaran<br>Persidangan Pegawai Kerja Sosial Perubatan 2026</h1>
        
        <p style="text-align:center; font-size:1.1em;">
            Jumlah peserta terkini: <span id="count">0</span> orang
        </p>

        <div id="loading">Memuat data peserta...</div>
        <div id="error-message"></div>

        <table id="pesertaTable" style="display:none;">
            <thead>
                <tr>
                    <th>Bil.</th>
                    <th>Nama Penuh</th>
                    <th>No. K/P</th>
                    <th>Negeri</th>
                    <th>Tempat Bertugas</th>
                    <th>No. Telefon</th>
                    <th>Tarikh Daftar</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div style="text-align:center; margin-top:30px;">
            <button class="download-btn" onclick="downloadCSV()">Download CSV</button>
            <button class="download-btn pdf" onclick="downloadPDF()">Download PDF (Print)</button>
        </div>

        <div style="text-align:center; margin-top:20px;">
            <button class="back-btn" onclick="window.location.href='https://pkspconference2026.netlify.app/'">Kembali ke Laman Utama</button>
        </div>
    </div>
</div>

<script type="module">
    console.log("Skrip admin LOADED – debug 1");

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    console.log("Import Firebase OK – debug 2");

    const firebaseConfig = {
        apiKey: "AIzaSyBRKVRVCNW5fQxKcGHGH_lQdrpfBpmGmUU",
        authDomain: "pkspconference.firebaseapp.com",
        projectId: "pkspconference",
        storageBucket: "pkspconference.firebasestorage.app",
        messagingSenderId: "643373687923",
        appId: "1:643373687923:web:0aa25f76f9080e3d1df606"
    };

    const ADMIN_PASSWORD = "pksp2026admin";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    console.log("Firebase initialized – debug 3");

    // Auto sign in anonymous supaya read dibenarkan
    signInAnonymously(auth)
        .then(() => console.log("Admin signed in anonymously – read OK"))
        .catch(err => console.error("Anon sign-in error:", err));

    // Password check
    document.getElementById('loginBtn').addEventListener('click', () => {
        console.log("Button Masuk diklik – debug 4");
        const pass = document.getElementById('adminPass').value.trim();
        if (pass === ADMIN_PASSWORD) {
            console.log("Password betul – show content");
            document.getElementById('password-container').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadData();
        } else {
            alert('Kata laluan salah!');
        }
    });

    function loadData() {
        console.log("loadData dipanggil – mulakan query");

        const q = query(
            collection(db, "artifacts", "msw-kuantan-2026", "public", "data", "pendaftaran"),
            orderBy("timestamp", "desc")
        );

        onSnapshot(q, (snapshot) => {
            console.log("Snapshot OK! Bilangan peserta:", snapshot.size);

            const tableBody = document.getElementById("tableBody");
            const countEl = document.getElementById("count");
            const loading = document.getElementById("loading");
            const table = document.getElementById("pesertaTable");
            const errorMsg = document.getElementById("error-message");

            tableBody.innerHTML = "";
            let bil = 1;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const ts = data.timestamp ? data.timestamp.seconds * 1000 : null;
                const tarikh = ts ? new Date(ts).toLocaleString("ms-MY", {day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit"}) : "—";

                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${bil++}</td>
                    <td>${data.nama || "—"}</td>
                    <td>${data.ic || "—"}</td>
                    <td>${data.negeri || "—"}</td>
                    <td>${data.tempat_bertugas || "—"}</td>
                    <td>${data.tel || "—"}</td>
                    <td class="timestamp">${tarikh}</td>
                `;
                tableBody.appendChild(row);
            });

            countEl.textContent = snapshot.size;
            loading.style.display = "none";
            table.style.display = "table";
            errorMsg.innerHTML = "";

            if (snapshot.size === 0) {
                errorMsg.innerHTML = "Tiada rekod lagi.";
            }
        }, (error) => {
            console.error("Ralat Firestore:", error);
            document.getElementById("loading").style.display = "none";
            document.getElementById("error-message").innerHTML = `Ralat: ${error.message} (kod: ${error.code})`;
        });
    }

    // DOWNLOAD CSV
    function downloadCSV() {
        console.log("Download CSV ditekan");

        const table = document.getElementById('pesertaTable');
        if (!table || table.style.display === 'none') {
            alert("Table belum load atau tak kelihatan!");
            return;
        }

        let csv = [];
        const rows = table.querySelectorAll('tr');
        rows.forEach(row => {
            const cols = row.querySelectorAll('td, th');
            const rowData = Array.from(cols).map(col => `"${col.innerText.replace(/"/g, '""')}"`);
            csv.push(rowData.join(','));
        });

        const csvContent = "\uFEFF" + csv.join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'Senarai_Peserta_Pendaftaran.csv';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // DOWNLOAD PDF (simple print)
    function downloadPDF() {
        console.log("Download PDF ditekan");
        window.print();  // Buka dialog print → pilih Save as PDF
    }
</script>

</body>
</html>
